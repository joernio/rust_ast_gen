name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml
        run: bash .github/scripts/verify-release-tag.sh

      - name: Run tests
        run: cargo test --locked

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset_name: rust_ast_gen-linux
            binary_extension: ""
          - os: ubuntu-24.04-arm
            asset_name: rust_ast_gen-linux-arm
            binary_extension: ""
          - os: macos-15-intel
            asset_name: rust_ast_gen-macos
            binary_extension: ""
          - os: macos-15
            asset_name: rust_ast_gen-macos-arm
            binary_extension: ""
          - os: windows-2025
            asset_name: rust_ast_gen-win.exe
            binary_extension: ".exe"
          - os: windows-11-arm
            asset_name: rust_ast_gen-win-arm.exe
            binary_extension: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Rename release binary
        shell: bash
        run: |
          mkdir dist
          cp "target/release/rust_ast_gen${{ matrix.binary_extension }}" "dist/${{ matrix.asset_name }}"

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    needs:
      - verify
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: asset-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
